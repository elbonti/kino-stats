name: Actualizar datos del Kino

on:
  schedule:
    - cron: '0 23 * * *' # Se ejecuta todos los días (ejemplo)
  workflow_dispatch: # Te permite ejecutarlo manualmente con un botón

# ¡ESTA LÍNEA ES CLAVE! Le dice a GitHub que este script puede modificar archivos
permissions:
  contents: write 

jobs:
  actualizar-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ... Aquí van tus pasos para instalar librerías y correr tu script de Python ...
      # Ejemplo:
      # - name: Instalar dependencias
      #   run: pip install requests pandas
      # - name: Ejecutar script de loteria.cl
      #   run: python mi_script.py

           - name: Guardar y subir cambios con PAT
        run: |
          git config --global user.name "elbonti" # Pon aquí tu usuario real de GitHub
          git config --global user.email "tu_correo_real@ejemplo.com"
          git add .
          git commit -m "chore: actualizar datos del dashboard" || echo "No hay cambios que subir"
          # Fíjate cómo usamos el secreto en la URL del push:
          git push https://elbonti:${{ secrets.PAT_TOKEN }}@github.com/elbonti/kino-stats.git main
